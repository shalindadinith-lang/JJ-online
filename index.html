<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stock System</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  margin: 0;
}

.container {
  width: 80%;
  margin: 30px auto;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px #ccc;
}

h2 { text-align: center; }

input {
  padding: 10px;
  margin: 5px;
  width: 22%;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  background: #007bff;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: #0056b3;
}

#search {
  width: 100%;
  margin-top: 10px;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
  text-align: center;
}

tr:hover { background: #f1f1f1; }
</style>

</head>
<body>

<div class="container">
  <h2>📦 Stock Management</h2>

  <input type="text" id="id" placeholder="Item ID">
  <input type="text" id="name" placeholder="Name">
  <input type="number" id="price" placeholder="Price">
  <input type="number" id="qty" placeholder="Quantity">

  <br>

  <button onclick="addItem()">Add / Auto Update</button>
  <button onclick="updateItem()">Update</button>
  <button onclick="deleteItem()">Delete</button>

  <input type="text" id="search" placeholder="Search..." onkeyup="searchItem()">

  <table id="table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Price</th>
        <th>Qty</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxuAhnuacKBJAI5klqEiW83Ehrs0WxB9YaI7TSkKlgku2dBvMEW3Ge3rJLq_M6RsjJ4/exec"; // 👈 replace කරන්න

function val(id){
  return document.getElementById(id).value;
}

// Load data
function fetchData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      let tbody = document.querySelector("#table tbody");
      tbody.innerHTML = "";

      data.slice(1).forEach(row => {
        let tr = `
          <tr onclick="selectRow('${row[0]}','${row[1]}','${row[2]}','${row[3]}')">
            <td>${row[0]}</td>
            <td>${row[1]}</td>
            <td>${row[2]}</td>
            <td>${row[3]}</td>
          </tr>
        `;
        tbody.innerHTML += tr;
      });
    });
}

// Select row
function selectRow(id, name, price, qty) {
  document.getElementById("id").value = id;
  document.getElementById("name").value = name;
  document.getElementById("price").value = price;
  document.getElementById("qty").value = qty;
}

// ADD (Auto Quantity Add)
function addItem() {
  fetch(`${API}?action=add&id=${val("id")}&name=${val("name")}&price=${val("price")}&qty=${val("qty")}`, {
    method: "POST"
  })
  .then(res => res.text())
  .then(msg => {
    if (msg === "updated") {
      alert("🔄 Quantity Added to Existing Item!");
    } else if (msg === "added") {
      alert("✅ New Item Added!");
    } else {
      alert("❌ Error!");
    }
    fetchData();
  });
}

// UPDATE
function updateItem() {
  fetch(`${API}?action=update&id=${val("id")}&name=${val("name")}&price=${val("price")}&qty=${val("qty")}`, {
    method: "POST"
  }).then(() => {
    alert("✏️ Updated!");
    fetchData();
  });
}

// DELETE
function deleteItem() {
  fetch(`${API}?action=delete&id=${val("id")}`, {
    method: "POST"
  }).then(() => {
    alert("🗑️ Deleted!");
    fetchData();
  });
}

// SEARCH
function searchItem() {
  let input = document.getElementById("search").value.toLowerCase();
  let rows = document.querySelectorAll("#table tbody tr");

  rows.forEach(row => {
    row.style.display = row.innerText.toLowerCase().includes(input)
      ? ""
      : "none";
  });
}

// Load
fetchData();

</script>

</body>
</html>
