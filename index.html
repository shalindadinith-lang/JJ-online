<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📦 ස්මාර්ට් තොග කළමනාකරණය (Backup + Merge)</title>
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, Arial, sans-serif; }
    body { background: #eef2f7; margin: 0; padding: 20px; }
    .container {
      max-width: 1400px; margin: auto; background: white;
      border-radius: 32px; padding: 20px 28px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.1);
    }
    h2 { color: #1e466e; border-left: 6px solid #1e466e; padding-left: 18px; margin-top: 0; }
    .form-group { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
    .form-group input {
      flex: 1; padding: 12px 16px; border: 1px solid #bdc4cc; border-radius: 60px;
      font-size: 1rem; background: #fdfdfd;
    }
    .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    button {
      background: #1e466e; border: none; color: white; padding: 10px 22px;
      border-radius: 40px; cursor: pointer; font-weight: bold; transition: 0.2s;
    }
    button:hover { background: #0f2d4a; transform: translateY(-1px); }
    .btn-green { background: #2c6e2c; }
    .btn-green:hover { background: #1e4f1e; }
    .btn-red { background: #b22234; }
    .btn-red:hover { background: #8b1a1a; }
    .btn-gray { background: #5a6874; }
    .search-box { width: 100%; padding: 12px 20px; margin: 15px 0; border-radius: 60px; border: 1px solid #ccc; font-size: 1rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { background: #1e466e; color: white; padding: 12px; }
    td, th { border: 1px solid #cfdee9; padding: 10px; text-align: center; }
    tr:hover td { background: #e6f2f9; cursor: pointer; }
    .stats {
      display: flex; justify-content: space-between; background: #e9edf2;
      padding: 12px 20px; border-radius: 60px; margin: 15px 0;
      font-weight: bold;
    }
    .msg-area { background: #f0f4f8; padding: 12px; border-radius: 60px; text-align: center; margin-top: 20px; }
    .low-stock { background-color: #ffe0e0 !important; }
  </style>
</head>
<body>
<div class="container">
  <h2>📦 ස්මාර්ට් තොග කළමනාකරණය</h2>

  <div class="form-group">
    <input type="text" id="id" placeholder="භාණ්ඩ කේතය (ID)">
    <input type="text" id="name" placeholder="නම">
    <input type="number" id="price" placeholder="මිල (රු.)">
    <input type="number" id="qty" placeholder="ප්‍රමාණය">
  </div>

  <div class="btn-group">
    <button id="addBtn">➕ එකතු කරන්න / ප්‍රමාණය එකතු වේ</button>
    <button id="updateBtn" class="btn-gray">✏️ සම්පූර්ණයෙන් යාවත්කාලීන කරන්න</button>
    <button id="deleteBtn" class="btn-red">🗑️ මකන්න</button>
    <button id="clearBtn">🧹 පෝරමය හිස් කරන්න</button>
    <button id="backupSheetBtn" class="btn-green">💾 Google Sheet තුළ Backup (නව Sheet)</button>
    <button id="exportCSVBtn" class="btn-green">📥 CSV උපස්ථය (බාගත)</button>
  </div>

  <input type="text" id="search" class="search-box" placeholder="🔍 සොයන්න... (ID, නම, මිල, ප්‍රමාණය)">

  <div class="stats">
    <span>📊 සම්පූර්ණ භාණ්ඩ ප්‍රමාණය: <strong id="totalQty">0</strong></span>
    <span>💰 සම්පූර්ණ වටිනාකම: <strong id="totalValue">රු. 0</strong></span>
  </div>

  <table id="stockTable">
    <thead><tr><th>ID</th><th>නම</th><th>මිල (රු.)</th><th>ප්‍රමාණය</th></tr></thead>
    <tbody id="tableBody"></tbody>
  </table>

  <div id="msgBox" class="msg-area">✅ සූදානම් • පේළියක් ක්ලික් කළොත් විස්තර පෝරමයට එයි</div>
</div>

<script>
// ======================== 🔧 CONFIGURATION ========================
// 👇 ඔයාගේ DEPLOYED WEB APP URL එක මෙතනට දාන්න
const API_URL = "https://script.google.com/macros/s/AKfycbwkB99lu_L3g0qwJ0JjsqpBn9QI3MRVmWmz_hKeN-BmtAXMzHHex_ND6psrTFb1xroZ/exec";

// DOM elements
const idInp = document.getElementById('id');
const nameInp = document.getElementById('name');
const priceInp = document.getElementById('price');
const qtyInp = document.getElementById('qty');
const tbody = document.getElementById('tableBody');
const searchBox = document.getElementById('search');
const msgBox = document.getElementById('msgBox');
const totalQtySpan = document.getElementById('totalQty');
const totalValueSpan = document.getElementById('totalValue');

let stockData = [];

function showMessage(msg, isError = false) {
  msgBox.innerHTML = isError ? `❌ ${msg}` : `✅ ${msg}`;
  msgBox.style.color = isError ? "#b22234" : "#1e466e";
  console.log(msg);
  setTimeout(() => {
    if (msgBox.innerHTML.includes(msg))
      msgBox.innerHTML = "✅ සූදානම් • පේළියක් ක්ලික් කළොත් විස්තර පෝරමයට එයි";
  }, 4000);
}

function safeString(value) {
  if (value === undefined || value === null) return "";
  return String(value);
}

function escapeHtml(str) {
  const s = safeString(str);
  return s.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

async function fetchData() {
  showMessage("දත්ත ලබා ගැනීම...");
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (!json.success) throw new Error(json.message || "Unknown error");
    stockData = json.data.slice(1);
    stockData = stockData.filter(row => row[0] !== "" && row[0] !== undefined);
    renderTable(stockData);
    updateStats(stockData);
    checkLowStock(stockData, 5);
    showMessage(`භාණ්ඩ ${stockData.length} ක් පූරණය කළා`);
  } catch (err) {
    showMessage("දත්ත ලබා ගැනීම අසාර්ථකයි: " + err.message, true);
  }
}

function renderTable(data) {
  tbody.innerHTML = "";
  if (!data || data.length === 0) {
    tbody.innerHTML = "<td><td colspan='4'>දත්ත නැත</td></tr>";
    return;
  }
  data.forEach(row => {
    const tr = document.createElement('tr');
    tr.onclick = () => selectRow(row[0], row[1], row[2], row[3]);
    tr.innerHTML = `
      <td>${escapeHtml(row[0])}</td>
      <td>${escapeHtml(row[1])}</td>
      <td>${parseFloat(row[2]).toFixed(2)}</td>
      <td>${parseInt(row[3])}</td>
    `;
    tbody.appendChild(tr);
  });
}

function selectRow(id, name, price, qty) {
  idInp.value = safeString(id);
  nameInp.value = safeString(name);
  priceInp.value = safeString(price);
  qtyInp.value = safeString(qty);
}

function updateStats(data) {
  let totalQ = 0, totalVal = 0;
  data.forEach(row => {
    let q = parseFloat(row[3]) || 0;
    let p = parseFloat(row[2]) || 0;
    totalQ += q;
    totalVal += q * p;
  });
  totalQtySpan.innerText = totalQ;
  totalValueSpan.innerText = `රු. ${totalVal.toFixed(2)}`;
}

function checkLowStock(data, threshold = 5) {
  const rows = document.querySelectorAll("#stockTable tbody tr");
  rows.forEach((row, idx) => {
    if (idx >= data.length) return;
    const qty = parseFloat(data[idx][3]) || 0;
    if (qty <= threshold && qty > 0) row.classList.add('low-stock');
    else row.classList.remove('low-stock');
  });
}

function filterTable() {
  const term = searchBox.value.toLowerCase();
  if (!term) {
    renderTable(stockData);
    updateStats(stockData);
    checkLowStock(stockData, 5);
    return;
  }
  const filtered = stockData.filter(row =>
    safeString(row[0]).toLowerCase().includes(term) ||
    safeString(row[1]).toLowerCase().includes(term) ||
    safeString(row[2]).includes(term) ||
    safeString(row[3]).includes(term)
  );
  renderTable(filtered);
  updateStats(filtered);
  checkLowStock(filtered, 5);
}

async function callApi(action, showSuccessMsg = true) {
  const id = idInp.value.trim();
  const name = nameInp.value.trim();
  const price = priceInp.value;
  const qty = qtyInp.value;

  if (action !== 'delete' && action !== 'backup') {
    if (!id) { showMessage("ID අවශ්‍යයි", true); return false; }
    if (!name) { showMessage("නම අවශ්‍යයි", true); return false; }
    if (price === "" || isNaN(parseFloat(price)) || parseFloat(price) < 0) {
      showMessage("නිවැරදි මිලක් දෙන්න", true); return false;
    }
    if (qty === "" || isNaN(parseInt(qty)) || parseInt(qty) < 0) {
      showMessage("නිවැරදි ප්‍රමාණයක් දෙන්න", true); return false;
    }
  }
  if (action === 'delete' && !id) { showMessage("මැකීමට ID අවශ්‍යයි", true); return false; }

  const params = new URLSearchParams({ action, id, name, price, qty });
  try {
    const res = await fetch(`${API_URL}?${params}`, { method: 'POST' });
    const json = await res.json();
    if (json.success) {
      if (showSuccessMsg) showMessage(json.message);
      await fetchData();
      if (action !== 'update') clearForm();
      return true;
    } else {
      showMessage(json.message || "දෝෂයක්", true);
      return false;
    }
  } catch (err) {
    showMessage("සම්බන්ධතා දෝෂය: " + err.message, true);
    return false;
  }
}

function exportToCSV() {
  if (!stockData || stockData.length === 0) {
    showMessage("උපස්ථ කිරීමට දත්ත නැත", true);
    return;
  }
  let csvRows = [["ID", "Name", "Price", "Quantity"]];
  stockData.forEach(row => {
    csvRows.push([safeString(row[0]), safeString(row[1]), safeString(row[2]), safeString(row[3])]);
  });
  const csvContent = csvRows.map(row => row.join(",")).join("\n");
  const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  const url = URL.createObjectURL(blob);
  link.href = url;
  link.setAttribute("download", `stock_backup_${new Date().toISOString().slice(0,19)}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
  showMessage("CSV උපස්ථය සාර්ථකයි! ගොනුව බාගත වේ.");
}

function clearForm() {
  idInp.value = nameInp.value = priceInp.value = qtyInp.value = "";
}

// Event listeners
document.getElementById('addBtn').onclick = () => callApi('add');
document.getElementById('updateBtn').onclick = () => callApi('update');
document.getElementById('deleteBtn').onclick = () => {
  if (idInp.value && confirm("මෙම භාණ්ඩය ස්ථිරවම මකන්නද?")) {
    callApi('delete');
  } else if (!idInp.value) {
    showMessage("මැකීමට ID තෝරන්න", true);
  }
};
document.getElementById('clearBtn').onclick = clearForm;
document.getElementById('backupSheetBtn').onclick = () => callApi('backup', true);
document.getElementById('exportCSVBtn').onclick = exportToCSV;
searchBox.addEventListener('input', filterTable);

// Initial load
fetchData();
</script>
</body>
</html>
