<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Data Entry</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7f9;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #1e88e5;
        }
        form {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin: 18px 0 6px;
            font-weight: bold;
            color: #333;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            background: #1e88e5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            cursor: pointer;
        }
        button:hover {
            background: #1565c0;
        }
    </style>
</head>
<body>
    <h1>Stock Data Entry</h1>
    
    <form action="https://script.google.com/macros/s/AKfycbwbbHq09eprWX_JRK1uCVlhlq_i52qxJ_cRF1omLQCR8Rjj4RU54irF18lFhvfiSjiw/exec" 
          method="POST">
        
        <label for="stockId">Stock ID:</label>
        <input type="text" id="stockId" name="stockId" placeholder="AAPL / TSLA" required>

        <label for="stockName">Stock Name:</label>
        <input type="text" id="stockName" name="stockName" placeholder="Apple Inc." required>

        <label for="price">Price:</label>
        <input type="number" id="price" name="price" step="0.01" placeholder="225.50" required>

        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" name="quantity" step="1" placeholder="50" required>

        <button type="submit">Submit to Google Sheet</button>
    </form>
</body>
</html>
